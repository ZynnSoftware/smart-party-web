[build]
  command = "npm run build"
  publish = "dist"

# Vite 8 requires Node >= 20.19 / 22.12; pin it so Netlify doesn't fall back to
# an older default and fail the build.
[build.environment]
  NODE_VERSION = "22"

# Proxy API calls to the Heroku backend. Because it's a same-origin rewrite
# (status 200), the browser never makes a cross-origin request — no CORS needed.
# This block MUST come before the SPA fallback below, or /api would be swallowed.
[[redirects]]
  from = "/api/*"
  to = "https://smart-party-api-c88a82569564.herokuapp.com/:splat"
  status = 200
  force = true

# SPA fallback: every other route serves index.html so react-router handles it
# (otherwise a refresh on /events/:id would 404).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers for every response served by Netlify.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # CSP tuned for this Vite/React SPA: scripts are same-origin bundles; React
    # uses inline style attributes (needs 'unsafe-inline' for style); /api is
    # same-origin via the proxy above (connect-src 'self'); Inter/Sora fonts are
    # self-hosted via @fontsource (bundled same-origin, no external font host).
    #
    # Clerk (auth): loads its JS and talks to the Frontend API on
    # *.clerk.accounts.dev (test/dev instances) — for a production Clerk instance
    # on the custom domain, also add https://clerk.reparteai.com.br to script-src
    # and connect-src. Clerk serves avatars from img.clerk.com, sends telemetry to
    # clerk-telemetry.com, and runs Cloudflare Turnstile (challenges.cloudflare.com)
    # for bot protection, which needs script-src + frame-src. worker-src blob: is
    # for Clerk's web worker.
    #
    # Google Tag Manager (GTM-TSQK8K3Q, wired in index.html): the inline bootstrap
    # snippet needs 'unsafe-inline' on script-src (GTM has no nonce/hash support
    # here since it's a static Netlify header, not server-rendered); its loader
    # script comes from googletagmanager.com, which then injects GA4 (Google
    # Analytics) tags that report to google-analytics.com / analytics.google.com;
    # the noscript fallback iframe needs frame-src on googletagmanager.com.
    #
    # Microsoft Clarity is injected as a GTM tag: its loader script comes from
    # www.clarity.ms, and it reports session data to *.clarity.ms subdomains.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://*.clerk.accounts.dev https://challenges.cloudflare.com https://www.googletagmanager.com https://*.google-analytics.com https://www.clarity.ms; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://img.clerk.com https://www.googletagmanager.com https://*.google-analytics.com; font-src 'self' data:; connect-src 'self' https://*.clerk.accounts.dev https://clerk-telemetry.com https://www.googletagmanager.com https://*.google-analytics.com https://*.analytics.google.com https://*.clarity.ms; worker-src 'self' blob:; frame-src https://challenges.cloudflare.com https://www.googletagmanager.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
