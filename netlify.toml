[build]
  command = "npm run build"
  publish = "dist"

# Vite 8 requires Node >= 20.19 / 22.12; pin it so Netlify doesn't fall back to
# an older default and fail the build.
[build.environment]
  NODE_VERSION = "22"

# Proxy API calls to the Heroku backend. Because it's a same-origin rewrite
# (status 200), the browser never makes a cross-origin request — no CORS needed.
# This block MUST come before the SPA fallback below, or /api would be swallowed.
[[redirects]]
  from = "/api/*"
  to = "https://smart-party-api-c88a82569564.herokuapp.com/:splat"
  status = 200
  force = true

# SPA fallback: every other route serves index.html so react-router handles it
# (otherwise a refresh on /events/:id would 404).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers for every response served by Netlify.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # CSP tuned for this Vite/React SPA: scripts are same-origin bundles; React
    # uses inline style attributes (needs 'unsafe-inline' for style); /api is
    # same-origin via the proxy above (connect-src 'self'); the Inter font loads
    # from Google Fonts (googleapis stylesheet + gstatic font files).
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
